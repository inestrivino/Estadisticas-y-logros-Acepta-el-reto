name: app-prueba

services:
  front:
    image: "n3stor173/app-front:latest"
    container_name: app-front-prueba
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://back:3000
      - SOCKETS_URL=http://back:8080
    depends_on:
      - back

  back:
    image: "n3stor173/app-back:latest"
    container_name: app-back-prueba
    ports:
      - "8080:8080"
      - "9229:9229"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
  
  redis:
    image: "redis:alpine"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  redis_data: