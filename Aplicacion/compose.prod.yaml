name: app-prod

services:
  front:
    image: app-front-prod
    container_name: app-front-prod
    restart: unless-stopped
    build: 
      context: .
      dockerfile: ./front/Dockerfile.prod
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://back:3000
      - SOCKETS_URL=http://back:8080
    depends_on:
      - back

  back:
    image: app-back-prod
    container_name: app-back-prod
    restart: unless-stopped
    build: 
      context: .
      dockerfile: ./back/Dockerfile.prod
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./.env
    depends_on:
      - redis
  
  redis:
    image: "redis:alpine"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  redis_data: