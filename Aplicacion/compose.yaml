services:
  front:
    build: 
      context: ./front
      dockerfile: Dockerfile.front
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
      - /app/node_modules

  back:
    build: 
      context: ./back
      dockerfile: Dockerfile.back
    ports:
      - "3000:3000"
      - "8080:8080"
      - "9229:9229"
    depends_on:
      - redis
    volumes:
      - ./back:/app
      - /app/node_modules
  
  redis:
    image: "redis"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  redis_data: