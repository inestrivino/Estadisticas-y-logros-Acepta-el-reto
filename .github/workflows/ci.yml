on: [push, pull_request]

jobs:
  ci-back:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Aplicacion/back
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run test

      - name: Subir reporte
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.REPORTS_TOKEN }}
          external_repository: n3stor173/Reportes-Estadisticas-Logros
          publish_dir: ./test-report
          destination_dir: reportes/back