on: [push, pull_request]



jobs:
  ci-back:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-reports-${{ github.ref }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: Aplicacion/back
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run test

      - name: Subir reporte
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.REPORTS_TOKEN }}
          repository-name: N3STOR173/Reportes-Estadisticas-Logros
          branch: gh-pages
          folder: Aplicacion/back/test-report
          target-folder: back/${{ github.ref_name }}
          clean: true

  ci-front:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-reports-${{ github.ref }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: Aplicacion/front
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run test

      - name: Subir reporte
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.REPORTS_TOKEN }}
          repository-name: N3STOR173/Reportes-Estadisticas-Logros
          branch: gh-pages
          folder: Aplicacion/front/test-report
          target-folder: front/${{ github.ref_name }}
          clean: true